name: Monstermaze
version: 1.0.0
main: tinesone.monstermaze.MonstermazePlugin
description: Asymmetrical pvp minigame
author: tinesone
api-version: '26.1'
default-permission: op


commands:
  generateMaze:
    description: Generate a maze. Made for testing purposes. Will place in current world so be careful!!
    usage: /generateMaze <x> <y> <z>
  disguise:
    description: Disguise as a mob. Used for testing purposes
    usage: /disguise <mob>
  stopgame:
    description: Stop a active game
    usage: /stopgame